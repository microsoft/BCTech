suite_setup: SVA-SETUP
tests:
- name: NL-TODAY-RELEASED
  description: User says "today" — order with today's shipment date, Complete+Full — released.
  turns:
    - turn_setup:
        setup_actions:
         - action_type: create_sales_order
           action_data:
           - "Sell-to Customer No.": SVCUST01
             "Shipping Advice": Complete
             "Shipment Date": "$DateFormula-<CD>$"
             lines:
               - Quantity: 10
                 "Location Code": SVLocation
                 quantity_in_inventory: 10
                 reserve: true
      query:
         from: Jane Doe
         title: "Run and process all with shipment date today"
         message: "Run and process all with shipment date today"
      expected_data:
         agent_released_orders: 1

- name: NL-TODAY-NOT-RELEASED
  description: User says "today" — order with today's shipment date, Complete+None — not released.
  turns:
    - turn_setup:
        setup_actions:
         - action_type: create_sales_order
           action_data:
           - "Sell-to Customer No.": SVCUST01
             "Shipping Advice": Complete
             "Shipment Date": "$DateFormula-<CD>$"
             lines:
               - Quantity: 10
                 "Location Code": SVLocation
                 quantity_in_inventory: 0
                 reserve: false
      query:
         from: Jane Doe
         title: "Run and process all with shipment date today"
         message: "Run and process all with shipment date today"
      expected_data:
         agent_released_orders: 0

