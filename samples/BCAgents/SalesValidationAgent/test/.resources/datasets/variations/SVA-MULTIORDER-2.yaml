suite_setup: SVA-SETUP
tests:
- name: 3ORD-MIX
  description: 3 orders — Complete+Full, Complete+None, Partial+Partial (qty 15, 12, 8) — mixed (2 released, 1 not).
  turns:
    - turn_setup:
        setup_actions:
         - action_type: create_sales_order
           action_data:
           - "Sell-to Customer No.": SVCUST02
             "Shipping Advice": Complete
             "Shipment Date": "$DateFormula-<CW+2M+1D>$"
             lines:
               - Quantity: 15
                 "Location Code": SVLocation
                 quantity_in_inventory: 15
                 reserve: true
           - "Sell-to Customer No.": SVCUST01
             "Shipping Advice": Partial
             "Shipment Date": "$DateFormula-<CW+2M+1D>$"
             lines:
               - Quantity: 12
                 "Location Code": SVLocation
                 quantity_in_inventory: 6
                 reserve: true
           - "Sell-to Customer No.": SVCUST02
             "Shipping Advice": Complete
             "Shipment Date": "$DateFormula-<CW+2M+1D>$"
             lines:
               - Quantity: 8
                 "Location Code": SVLocation
                 quantity_in_inventory: 0
                 reserve: false
      query:
         from: Jane Doe
         title: "Run and process all with shipment date $DateFormula-<CW+2M+1D>$"
         message: "Run and process all with shipment date $DateFormula-<CW+2M+1D>$"
      expected_data:
         agent_released_orders: 2

