suite_setup: SVA-SETUP
tests:
- name: COMP-FULL
  description: Single order, single line — Complete + Full reservation (qty 15) — released.
  turns:
    - turn_setup:
        setup_actions:
         - action_type: create_sales_order
           action_data:
           - "Sell-to Customer No.": SVCUST02
             "Shipping Advice": Complete
             "Shipment Date": "$DateFormula-<CW+2M+1D>$"
             lines:
               - Quantity: 15
                 "Location Code": SVLocation
                 quantity_in_inventory: 15
                 reserve: true
      query:
         from: Jane Doe
         title: "Run and process all with shipment date $DateFormula-<CW+2M+1D>$"
         message: "Run and process all with shipment date $DateFormula-<CW+2M+1D>$"
      expected_data:
         agent_released_orders: 1

