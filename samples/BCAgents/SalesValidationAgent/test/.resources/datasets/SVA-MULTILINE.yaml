suite_setup: SVA-SETUP
tests:
- name: ML-C-ALL
  description: Single order, 2 lines — Complete + all lines fully reserved — released.
  turns:
    - turn_setup:
        setup_actions:
         - action_type: create_sales_order
           action_data:
           - "Sell-to Customer No.": SVCUST01
             "Shipping Advice": Complete
             "Shipment Date": "$DateFormula-<CW+1M+1D>$"
             lines:
               - Quantity: 10
                 "Location Code": SVLocation
                 quantity_in_inventory: 10
                 reserve: true
               - Quantity: 5
                 "Location Code": SVLocation
                 quantity_in_inventory: 5
                 reserve: true
      query:
         from: Jane Doe
         title: "Run and process all with shipment date $DateFormula-<CW+1M+1D>$"
         message: "Run and process all with shipment date $DateFormula-<CW+1M+1D>$"
      expected_data:
         agent_released_orders: 1

